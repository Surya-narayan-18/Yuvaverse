<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Registrations - Yuvaverse</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/admin-dashboard.css">
  <style>
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: var(--card-bg); font-size: 0.9rem; }
    th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border-color); }
    th { background: #f9fafb; font-weight: 600; color: var(--text-secondary); cursor: pointer; }
    th:hover { background: #f3f4f6; }
    .btn { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .btn-export { background: #10b981; color: white; }
    .badge { padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: bold; }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-failed { background: #fee2e2; color: #991b1b; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .refund-btn { background: #ef4444; color: white; padding: 0.25rem 0.5rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
  </style>
</head>
<body class="admin-body">
  <script type="module" src="/js/admin/authGuard.js"></script>

  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <div class="sidebar-brand">Yuvaverse</div>
      <nav class="sidebar-nav">
        <a href="/admin-dashboard.html">Overview</a>
        <a href="/admin-events.html">Events</a>
        <a href="/admin-registrations.html" class="active">Registrations</a>
        <a href="/admin-applications.html">Applications</a>
      </nav>
      <button id="logout-btn" class="logout-btn">Logout</button>
    </aside>

    <main class="main-content">
      <header class="dashboard-header" style="display:flex; justify-content: space-between; align-items: center;">
        <div>
          <h1>Registrations & Payments</h1>
          <p>View participants and manage refunds.</p>
        </div>
        <button class="btn btn-export" id="export-csv-btn">Export to CSV</button>
      </header>

      <div style="margin-bottom: 1rem;">
        <input type="text" id="search-filter" placeholder="Search by name or email..." style="padding:0.5rem; width: 300px; border:1px solid var(--border-color); border-radius:4px;">
      </div>

      <div style="overflow-x: auto;">
        <table id="registrations-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Participant</th>
              <th>Event</th>
              <th>Status</th>
              <th>Custom Answers</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="regs-tbody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="/js/admin/registrations.js"></script>
</body>
</html>
