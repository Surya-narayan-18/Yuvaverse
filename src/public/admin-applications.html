<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruitment Pipeline - Yuvaverse</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/admin-dashboard.css">
  <style>
    .kanban-board {
      display: flex;
      gap: 1.5rem;
      overflow-x: auto;
      padding-bottom: 1rem;
      height: calc(100vh - 150px);
    }
    .kanban-column {
      flex: 1;
      min-width: 250px;
      background: #f9fafb;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-color);
    }
    .kanban-header {
      padding: 1rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      color: var(--text-secondary);
    }
    .kanban-items {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .kanban-card {
      background: white;
      padding: 1rem;
      border-radius: 6px;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      border: 1px solid var(--border-color);
      cursor: grab;
    }
    .kanban-card:active { cursor: grabbing; }
    .kanban-card h4 { margin: 0 0 0.5rem 0; font-size: 1rem; }
    .kanban-card p { margin: 0; font-size: 0.8rem; color: var(--text-secondary); }
    .kanban-card .role { display: inline-block; background: #e0e7ff; color: #3730a3; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; margin-top: 0.5rem; font-weight: 600; }
    
    /* Drag over highlight */
    .kanban-items.drag-over { background: #e5e7eb; }
  </style>
</head>
<body class="admin-body">
  <script type="module" src="/js/admin/authGuard.js"></script>

  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <div class="sidebar-brand">Yuvaverse</div>
      <nav class="sidebar-nav">
        <a href="/admin-dashboard.html">Overview</a>
        <a href="/admin-events.html">Events</a>
        <a href="/admin-registrations.html">Registrations</a>
        <a href="/admin-applications.html" class="active">Applications</a>
      </nav>
      <button id="logout-btn" class="logout-btn">Logout</button>
    </aside>

    <main class="main-content">
      <header class="dashboard-header">
        <h1>Recruitment Pipeline</h1>
        <p>Drag and drop applications to update applicant status.</p>
      </header>

      <div class="kanban-board">
        <div class="kanban-column">
          <div class="kanban-header">NEW <span class="count" id="count-NEW">0</span></div>
          <div class="kanban-items" data-status="NEW"></div>
        </div>
        
        <div class="kanban-column">
          <div class="kanban-header">SHORTLISTED <span class="count" id="count-SHORTLISTED">0</span></div>
          <div class="kanban-items" data-status="SHORTLISTED"></div>
        </div>

        <div class="kanban-column">
          <div class="kanban-header">INTERVIEWED <span class="count" id="count-INTERVIEWED">0</span></div>
          <div class="kanban-items" data-status="INTERVIEWED"></div>
        </div>

        <div class="kanban-column">
          <div class="kanban-header">RECRUITED <span class="count" id="count-RECRUITED">0</span></div>
          <div class="kanban-items" data-status="RECRUITED"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/js/admin/applications.js"></script>
</body>
</html>
