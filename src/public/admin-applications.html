<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/assets/logo_dark.png" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruitment Pipeline - Yuvaverse</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/admin-dashboard.css">
  <style>
    .kanban-board {
      display: flex;
      gap: 1.25rem;
      overflow-x: auto;
      padding-bottom: 1rem;
      height: calc(100vh - 150px);
    }
    .kanban-column {
      flex: 1;
      min-width: 220px;
      background: #f9fafb;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-color);
    }
    /* Rejected column distinct styling */
    .kanban-column.col-rejected {
      background: #fff5f5;
      border-color: #fecaca;
    }
    .kanban-column.col-rejected .kanban-header {
      color: #991b1b;
      border-bottom-color: #fecaca;
    }

    .kanban-header {
      padding: 0.85rem 1rem;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-secondary);
    }
    .kanban-header .count {
      background: #e5e7eb;
      color: #374151;
      border-radius: 9999px;
      padding: 0.1rem 0.55rem;
      font-size: 0.75rem;
    }
    .col-rejected .kanban-header .count {
      background: #fee2e2;
      color: #991b1b;
    }

    .kanban-items {
      flex: 1;
      padding: 0.85rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .kanban-card {
      background: white;
      padding: 0.85rem 1rem;
      border-radius: 6px;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      border: 1px solid var(--border-color);
      cursor: grab;
    }
    .kanban-card:active { cursor: grabbing; }
    .kanban-card h4 { margin: 0 0 0.35rem 0; font-size: 0.95rem; }
    .kanban-card p  { margin: 0; font-size: 0.8rem; color: var(--text-secondary); }
    .kanban-card .role {
      display: inline-block;
      background: #e0e7ff; color: #3730a3;
      padding: 0.15rem 0.5rem; border-radius: 4px;
      font-size: 0.72rem; margin-top: 0.4rem; font-weight: 600;
    }
    /* Rejected card look */
    .col-rejected .kanban-card {
      background: #fff;
      border-color: #fecaca;
      opacity: 0.85;
    }
    .col-rejected .kanban-card .role {
      background: #fee2e2; color: #991b1b;
    }

    /* Reject button on each card */
    .reject-btn {
      margin-top: 0.6rem;
      display: block;
      width: 100%;
      padding: 0.3rem 0;
      font-size: 0.75rem;
      font-weight: 600;
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      border-radius: 4px;
      cursor: pointer;
      transition: background .15s;
      text-align: center;
    }
    .reject-btn:hover { background: #fecaca; }

    /* Drag over highlight */
    .kanban-items.drag-over { background: #e5e7eb; }
    .col-rejected .kanban-items.drag-over { background: #fee2e2; }

    /* Toast */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
      padding: 0.8rem 1.25rem; border-radius: 8px; font-size: 0.875rem;
      font-weight: 600; color: #fff; opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s; transform: translateY(8px);
      max-width: 340px; box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    #toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    #toast.success { background: #059669; }
    #toast.error   { background: #dc2626; }
  </style>
</head>
<body class="admin-body">
  <script type="module" src="/js/admin/authGuard.js"></script>

  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <div class="sidebar-brand" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
        <img src="/assets/admin_logo.png" alt="Yuvaverse Logo" style="height: 48px; width: auto; display: block;"/>
        <span style="font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1;">Yuvaverse</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin-dashboard.html">Overview</a>
        <a href="/admin-events.html">Events</a>
        <a href="/admin-registrations.html">Registrations</a>
        <a href="/admin-applications.html" class="active">Applications</a>
      </nav>
      <button id="logout-btn" class="logout-btn">Logout</button>
    </aside>

    <main class="main-content">
      <header class="dashboard-header">
        <h1>Recruitment Pipeline</h1>
        <p>Drag and drop cards to update status, or click <strong>Reject</strong> on any card.</p>
      </header>

      <div class="kanban-board">
        <div class="kanban-column">
          <div class="kanban-header">New <span class="count" id="count-NEW">0</span></div>
          <div class="kanban-items" data-status="NEW"></div>
        </div>

        <div class="kanban-column">
          <div class="kanban-header">Shortlisted <span class="count" id="count-SHORTLISTED">0</span></div>
          <div class="kanban-items" data-status="SHORTLISTED"></div>
        </div>

        <div class="kanban-column">
          <div class="kanban-header">Interviewed <span class="count" id="count-INTERVIEWED">0</span></div>
          <div class="kanban-items" data-status="INTERVIEWED"></div>
        </div>

        <div class="kanban-column">
          <div class="kanban-header">Recruited <span class="count" id="count-RECRUITED">0</span></div>
          <div class="kanban-items" data-status="RECRUITED"></div>
        </div>

        <!-- REJECTED column -->
        <div class="kanban-column col-rejected">
          <div class="kanban-header">Rejected <span class="count" id="count-REJECTED">0</span></div>
          <div class="kanban-items" data-status="REJECTED"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script type="module" src="/js/admin/applications.js"></script>
</body>
</html>
