<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/assets/logo_dark.png" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Yuvaverse</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    /* Quick inline styles for login, since it's simple */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f3f4f6;
      padding: 2rem;
    }
    .login-wrapper {
      display: flex;
      align-items: center;
      gap: 4rem;
      width: 100%;
      max-width: 900px;
      justify-content: center;
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }
    @media (max-width: 768px) {
      .login-wrapper {
        flex-direction: column;
        gap: 2rem;
        padding: 2rem;
      }
    }
    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
    }
    .login-brand img {
      width: 100%;
      height: auto;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
    }
    .login-container h1 {
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      text-align: center;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 4px;
    }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
    }
    .login-btn:hover {
      background-color: #2563eb;
    }
    .error-msg {
      color: red;
      font-size: 0.875rem;
      margin-top: 0.5rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-brand">
      <img src="/assets/logo_light.png" alt="Yuvaverse Logo" />
    </div>
    
    <div class="login-container">
      <h1>Admin Portal</h1>
      <form id="admin-login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div style="position: relative;">
            <input type="password" id="password" required style="padding-right: 40px;">
            <button type="button" id="togglePassword" aria-label="Toggle password visibility" style="position: absolute; right: 0; top: 0; height: 100%; width: 40px; background: transparent; color: #6b7280; border: none; padding: 0; display: flex; align-items: center; justify-content: center; cursor: pointer;">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="login-btn">Login</button>
        <div id="error-message" class="error-msg">Invalid credentials.</div>
      </form>
    </div>
  </div>

  <script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const eyeIcon = document.querySelector('#eyeIcon');

    togglePassword.addEventListener('click', function () {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      
      if (type === 'text') {
        eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    });
  </script>
  <script type="module" src="/js/admin/login.js"></script>
</body>
</html>
